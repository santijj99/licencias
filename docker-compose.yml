services:
  licencias:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: licencias-api
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: ${SERVER_PORT:-8080}
      # Postgres compartido (obligatorio: user athland)
      DB_URL: jdbc:postgresql://athland-postgres:5432/${LICENCIAS_DB:-licencias}
      DB_USERNAME: ${DB_USERNAME:-athland}
      DB_PASSWORD: ${DB_PASSWORD:?Definí DB_PASSWORD en .env (mismo que POSTGRES_PASSWORD del postgres)}
      JWT_SECRET: ${JWT_SECRET:?Definí JWT_SECRET en .env}
      AES_KEY: ${AES_KEY:?Definí AES_KEY en .env (32 chars)}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5000}
      JAVA_OPTS: ${JAVA_OPTS:--Xms128m -Xmx512m -XX:+UseG1GC}
    ports:
      - "${LICENCIAS_PUBLISH_PORT:-8080}:8080"
    networks:
      - athland-net

networks:
  athland-net:
    external: true
    name: athland-net
